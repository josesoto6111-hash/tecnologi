<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computadoras | Index Software</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="computadoras.html">Computadoras</a>
        <a href="software.html">Software</a>
        <a href="licencias.html">Licencias</a>
        <a href="carrito.html">Carrito</a>
    </nav>

    <main style="padding: 20px;">
        <h1>Nuestras Computadoras</h1>
        
        <div class="grid-productos" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
            
            <div class="card">
                <img src="img/lenovo.jpg" alt="Lenovo IdeaPad 3" style="width:100%">
                <h3>Laptop Lenovo IdeaPad 3</h3>
                <p>Ryzen 5, 16 GB RAM, SSD 512 GB</p>
                <p><strong>$11,999 MXN</strong></p>
                <button class="btn" onclick="addToCart('Lenovo IdeaPad 3', 11999)">Agregar al carrito</button>
            </div>

            <div class="card">
                <img src="img/hp.jpg" alt="HP 15" style="width:100%">
                <h3>HP 15</h3>
                <p>Intel Core i5, 8 GB RAM</p>
                <p><strong>$10,499 MXN</strong></p>
                <button class="btn" onclick="addToCart('HP 15', 10499)">Agregar al carrito</button>
            </div>

            <div class="card">
                <img src="img/asus.jpg" alt="ASUS TUF Gaming" style="width:100%">
                <h3>ASUS TUF Gaming</h3>
                <p>Ryzen 7, RTX 4050</p>
                <p><strong>$24,999 MXN</strong></p>
                <button class="btn" onclick="addToCart('ASUS TUF Gaming', 24999)">Agregar al carrito</button>
            </div>

        </div>
    </main>

    <script src="js/carrito.js"></script>
</body>
</html>
